<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Envio de Atestados - RH</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 15px;
        }

        .content {
            padding: 40px 30px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #374151;
            font-size: 14px;
        }

        label .required {
            color: #EF4444;
        }

        input[type="text"], select {
            width: 100%;
            padding: 14px;
            border: 2px solid #E5E7EB;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus, select:focus {
            outline: none;
            border-color: #1e3c72;
        }

        .file-upload {
            position: relative;
            border: 3px dashed #D1D5DB;
            border-radius: 10px;
            padding: 40px 20px;
            text-align: center;
            transition: all 0.3s;
            cursor: pointer;
            background: #F9FAFB;
        }

        .file-upload:hover {
            border-color: #1e3c72;
            background: #F3F4F6;
        }

        .file-upload.dragover {
            border-color: #1e3c72;
            background: #EEF2FF;
        }

        .file-upload input[type="file"] {
            position: absolute;
            opacity: 0;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            cursor: pointer;
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .upload-text {
            color: #6B7280;
            font-size: 14px;
            margin-bottom: 5px;
        }

        .upload-hint {
            color: #9CA3AF;
            font-size: 12px;
        }

        .file-preview {
            margin-top: 15px;
            padding: 15px;
            background: #F0FDF4;
            border: 2px solid #86EFAC;
            border-radius: 10px;
            display: none;
            align-items: center;
            gap: 12px;
        }

        .file-preview.show {
            display: flex;
        }

        .file-preview-icon {
            font-size: 32px;
        }

        .file-preview-info {
            flex: 1;
        }

        .file-preview-name {
            font-weight: 600;
            color: #166534;
            margin-bottom: 3px;
            font-size: 14px;
        }

        .file-preview-size {
            font-size: 12px;
            color: #15803D;
        }

        .file-preview-remove {
            padding: 8px 12px;
            background: #DC2626;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
        }

        .cid-info {
            margin-top: 10px;
            padding: 15px;
            background: #EFF6FF;
            border-left: 4px solid #3B82F6;
            border-radius: 6px;
            display: none;
        }
