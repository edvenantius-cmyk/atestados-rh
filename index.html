<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Envio de Atestados - RH</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 15px;
        }

        .content {
            padding: 40px 30px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #374151;
            font-size: 14px;
        }

        label .required {
            color: #EF4444;
        }

        input[type="text"], select {
            width: 100%;
            padding: 14px;
            border: 2px solid #E5E7EB;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus, select:focus {
            outline: none;
            border-color: #1e3c72;
        }

        .file-upload {
            position: relative;
            border: 3px dashed #D1D5DB;
            border-radius: 10px;
            padding: 40px 20px;
            text-align: center;
            transition: all 0.3s;
            cursor: pointer;
            background: #F9FAFB;
        }

        .file-upload:hover {
            border-color: #1e3c72;
            background: #F3F4F6;
        }

        .file-upload.dragover {
            border-color: #1e3c72;
            background: #EEF2FF;
        }

        .file-upload input[type="file"] {
            position: absolute;
            opacity: 0;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            cursor: pointer;
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .upload-text {
            color: #6B7280;
            font-size: 14px;
            margin-bottom: 5px;
        }

        .upload-hint {
            color: #9CA3AF;
            font-size: 12px;
        }

        .file-preview {
            margin-top: 15px;
            padding: 15px;
            background: #F0FDF4;
            border: 2px solid #86EFAC;
            border-radius: 10px;
            display: none;
            align-items: center;
            gap: 12px;
        }

        .file-preview.show {
            display: flex;
        }

        .file-preview-icon {
            font-size: 32px;
        }

        .file-preview-info {
            flex: 1;
        }

        .file-preview-name {
            font-weight: 600;
            color: #166534;
            margin-bottom: 3px;
            font-size: 14px;
        }

        .file-preview-size {
            font-size: 12px;
            color: #15803D;
        }

        .file-preview-remove {
            padding: 8px 12px;
            background: #DC2626;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
        }

        .cid-info {
            margin-top: 10px;
            padding: 15px;
            background: #EFF6FF;
            border-left: 4px solid #3B82F6;
            border-radius: 6px;
            display: none;
        }

        .cid-info.show {
            display: block;
        }

        .cid-info-title {
            font-weight: 600;
            color: #1E40AF;
            margin-bottom: 5px;
            font-size: 14px;
        }

        .cid-info-desc {
            color: #1E3A8A;
            font-size: 13px;
            line-height: 1.5;
        }

        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 10px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(30, 60, 114, 0.3);
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(30, 60, 114, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .alert {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .alert.show {
            display: block;
        }

        .alert-success {
            background: #D1FAE5;
            color: #065F46;
            border: 1px solid #6EE7B7;
        }

        .alert-error {
            background: #FEE2E2;
            color: #991B1B;
            border: 1px solid #FCA5A5;
        }

        .success-icon {
            font-size: 64px;
            text-align: center;
            margin-bottom: 20px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            display: none;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #1e3c72;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 600px) {
            .container {
                border-radius: 0;
            }
            
            body {
                padding: 0;
            }

            .content {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📋 Envio de Atestados</h1>
            <p>Departamento de Recursos Humanos</p>
        </div>

        <div class="content">
            <div id="alert" class="alert"></div>
            <div id="loading" class="loading">
                <div class="spinner"></div>
                <p style="color: #6B7280;">Enviando documento...</p>
            </div>

            <form id="atestadoForm" style="display: block;">
                <div class="form-group">
                    <label for="nomeColaborador">
                        Nome do Colaborador <span class="required">*</span>
                    </label>
                    <input type="text" id="nomeColaborador" required placeholder="Digite seu nome completo">
                </div>

                <div class="form-group">
                    <label for="tipoDocumento">
                        Tipo de Documento <span class="required">*</span>
                    </label>
                    <select id="tipoDocumento" required>
                        <option value="">Selecione o tipo</option>
                        <option value="atestado">Atestado Médico</option>
                        <option value="cerest">CEREST (Acidente de Trabalho)</option>
                        <option value="acidente">Comunicação de Acidente</option>
                        <option value="outro">Outro</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="cid">
                        CID (Código Internacional de Doenças)
                    </label>
                    <input type="text" id="cid" placeholder="Ex: J00, M54, Z76" 
                           oninput="buscarCID(this.value)" maxlength="5">
                    <div id="cidInfo" class="cid-info"></div>
                </div>

                <div class="form-group">
                    <label>
                        Anexar Documento <span class="required">*</span>
                    </label>
                    <div class="file-upload" id="fileUploadArea">
                        <input type="file" id="arquivo" required 
                               accept=".pdf,.jpg,.jpeg,.png,.heic"
                               onchange="handleFileSelect(event)">
                        <div class="file-upload-content">
                            <div class="upload-icon">📎</div>
                            <div class="upload-text">
                                Clique ou arraste o arquivo aqui
                            </div>
                            <div class="upload-hint">
                                Formatos aceitos: PDF, JPG, PNG, HEIC (máx. 10MB)
                            </div>
                        </div>
                    </div>
                    <div id="filePreview" class="file-preview"></div>
                </div>

                <button type="submit" class="btn btn-primary" id="btnEnviar">
                    📤 Enviar Documento
                </button>
            </form>

            <div id="successMessage" style="display: none;">
                <div class="success-icon">✅</div>
                <div class="alert alert-success show">
                    <strong>Documento enviado com sucesso!</strong><br>
                    O RH foi notificado e já pode visualizar seu documento.
                </div>
                <button class="btn btn-primary" onclick="location.reload()">
                    📄 Enviar Outro Documento
                </button>
            </div>
        </div>
    </div>

    <!-- VOCÊ VAI SUBSTITUIR ESSA CONFIGURAÇÃO DEPOIS -->
    <script type="module">
        // CONFIGURAÇÃO DO FIREBASE - VOCÊ VAI PREENCHER ISSO DEPOIS
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getFirestore, collection, addDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';
        import { getStorage, ref, uploadBytes, getDownloadURL } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js';

        // ⚠️ VOCÊ VAI SUBSTITUIR ISSO COM SUA CONFIGURAÇÃO DO FIREBASE
        const firebaseConfig = {
            apiKey: "SUA_API_KEY_AQUI",
            authDomain: "SEU_PROJETO.firebaseapp.com",
            projectId: "SEU_PROJETO_ID",
            storageBucket: "SEU_PROJETO.appspot.com",
            messagingSenderId: "SEU_SENDER_ID",
            appId: "SEU_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        window.db = db;
        window.storage = storage;
        window.firebaseImports = { collection, addDoc, serverTimestamp, ref, uploadBytes, getDownloadURL };
    </script>
    
    <script src="envio.js"></script>
</body>
</html>
