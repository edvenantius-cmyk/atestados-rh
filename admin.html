<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel RH - Atestados</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #F3F4F6;
        }

        /* Tela de Login */
        .login-screen {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            padding: 20px;
        }

        .login-box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 400px;
            width: 100%;
        }

        .login-box h1 {
            text-align: center;
            color: #1e3c72;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .login-box p {
            text-align: center;
            color: #6B7280;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .login-input {
            width: 100%;
            padding: 14px;
            border: 2px solid #E5E7EB;
            border-radius: 10px;
            font-size: 16px;
            margin-bottom: 20px;
        }

        .login-input:focus {
            outline: none;
            border-color: #1e3c72;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .login-btn:hover {
            transform: translateY(-2px);
        }

        .login-error {
            background: #FEE2E2;
            color: #991B1B;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .login-error.show {
            display: block;
        }

        /* Painel Admin */
        .admin-panel {
            display: none;
        }

        .admin-panel.show {
            display: block;
        }

        .topbar {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .topbar h1 {
            font-size: 24px;
        }

        .logout-btn {
            padding: 10px 20px;
            background: rgba(255,255,255,0.2);
            border: 2px solid white;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: white;
            color: #1e3c72;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .stat-card .number {
            font-size: 36px;
            font-weight: bold;
            color: #1F2937;
            margin-bottom: 5px;
        }

        .stat-card .label {
            color: #6B7280;
            font-size: 14px;
        }

        .stat-card.blue .number { color: #3B82F6; }
        .stat-card.green .number { color: #10B981; }
        .stat-card.orange .number { color: #F59E0B; }
        .stat-card.red .number { color: #EF4444; }

        .filters {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filters select, .filters input {
            padding: 10px 14px;
            border: 2px solid #E5E7EB;
            border-radius: 8px;
            font-size: 14px;
        }

        .filters button {
            padding: 10px 20px;
            background: #DC2626;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .table-container {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: #F9FAFB;
            border-bottom: 2px solid #E5E7EB;
        }

        th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: #374151;
            font-size: 14px;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #F3F4F6;
            font-size: 14px;
        }

        tbody tr:hover {
            background: #F9FAFB;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge.atestado { background: #DBEAFE; color: #1E40AF; }
        .badge.cerest { background: #FEF3C7; color: #92400E; }
        .badge.acidente { background: #FEE2E2; color: #991B1B; }
        .badge.outro { background: #F3F4F6; color: #374151; }
        .badge.novo { background: #FEF3C7; color: #92400E; }
        .badge.visto { background: #D1FAE5; color: #065F46; }

        .btn-action {
            padding: 8px 14px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s;
            margin-right: 5px;
        }

        .btn-view { background: linear-gradient(135deg, #3B82F6 0%, #2563EB 100%); color: white; }
        .btn-download { background: linear-gradient(135deg, #10B981 0%, #059669 100%); color: white; }
        .btn-delete { background: linear-gradient(135deg, #EF4444 0%, #DC2626 100%); color: white; }

        .btn-action:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #6B7280;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            overflow-y: auto;
        }

        .modal.show {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 30px;
            max-width: 900px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #E5E7EB;
        }

        .modal-close {
            font-size: 28px;
            cursor: pointer;
            color: #6B7280;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .info-item {
            background: #F9FAFB;
            padding: 12px;
            border-radius: 8px;
        }

        .info-item .label {
            font-size: 12px;
            color: #6B7280;
            margin-bottom: 5px;
        }

        .info-item .value {
            font-size: 14px;
            color: #1F2937;
            font-weight: 600;
        }

        .file-viewer {
            margin-top: 20px;
            border: 2px solid #E5E7EB;
            border-radius: 8px;
            overflow: hidden;
        }

        .file-viewer iframe, .file-viewer img {
            width: 100%;
            max-height: 600px;
            border: none;
        }
    </style>
</head>
<body>
    <div id="loginScreen" class="login-screen">
        <div class="login-box">
            <h1>🔐 Painel RH</h1>
            <p>Acesso restrito - Digite a senha</p>
            
            <div id="loginError" class="login-error"></div>
            
            <form id="loginForm">
                <input type="password" id="senha" class="login-input" 
                       placeholder="Digite a senha" required autofocus>
                <button type="submit" class="login-btn">Entrar</button>
            </form>
        </div>
    </div>

    <div id="adminPanel" class="admin-panel">
        <div class="topbar">
            <h1>📋 Painel RH - Atestados</h1>
            <button class="logout-btn" onclick="logout()">🚪 Sair</button>
        </div>

        <div class="container">
            <div class="stats" id="statsContainer"></div>

            <div class="filters">
                <select id="filtroTipo" onchange="filtrarAtestados()">
                    <option value="">Todos os Tipos</option>
                    <option value="atestado">Atestado Médico</option>
                    <option value="cerest">CEREST</option>
                    <option value="acidente">Acidente</option>
                    <option value="outro">Outro</option>
                </select>

                <select id="filtroStatus" onchange="filtrarAtestados()">
                    <option value="">Todos os Status</option>
                    <option value="novo">Novos</option>
                    <option value="visto">Vistos</option>
                </select>

                <input type="text" id="buscaNome" placeholder="Buscar por nome..." 
                       oninput="filtrarAtestados()">

                <button onclick="limparTodos()">🗑️ Limpar Todos</button>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Colaborador</th>
                            <th>Tipo</th>
                            <th>CID</th>
                            <th>Data Envio</th>
                            <th>Status</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaAtestados"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="modalDetalhes" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Detalhes do Documento</h2>
                <span class="modal-close" onclick="fecharModal()">&times;</span>
            </div>
            <div id="modalBody"></div>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
